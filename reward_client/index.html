<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reward Viewer</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
body{
  color:#e8e8e8;
  font:16px ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
}
pre{
  box-sizing:border-box;
  margin:0;
  width:100%;
  height:100%;
  padding:16px;
  overflow:auto;
  white-space:pre;
  letter-spacing:0;
}
</style>
</head>
<body>
<pre id="reward"></pre>
<script>
const reward=document.getElementById("reward");
const url=new URL(location.href);
const address=url.searchParams.get("address")||"ws://localhost:8080/reward";
const socket=new WebSocket(address);

function show(text){
  reward.textContent=text;
}

socket.onmessage=event=>{
  if(typeof event.data==="string"){
    show(event.data);
  }else if(event.data instanceof Blob){
    event.data.text().then(show);
  }else{
    socket.close();
  }
};
socket.onopen=()=>show("");
socket.onclose=()=>show("disconnected...");
socket.onerror=()=>show("disconnected...");
</script>
</body>
</html>
