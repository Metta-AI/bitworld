<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sprite Viewer</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
body{font:14px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
canvas{
  position:absolute;
  left:0;
  top:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  transform-origin:0 0;
}
#status{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#e8e8e8;
  background:#000;
  letter-spacing:0;
  pointer-events:none;
}
#status.hidden{display:none}
</style>
</head>
<body>
<canvas id="c" width="1" height="1"></canvas>
<div id="status">connecting...</div>
<script>
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
const status=document.getElementById("status");
const url=new URL(location.href);
const address=url.searchParams.get("address")||"ws://localhost:8080/sprite";
const palette=[
  [0,0,0,255],[194,195,199,255],[255,241,232,255],[255,0,77,255],
  [255,119,168,255],[95,87,79,255],[171,82,54,255],[255,163,0,255],
  [255,236,39,255],[126,37,83,255],[0,135,81,255],[0,228,54,255],
  [29,43,83,255],[131,118,156,255],[41,173,255,255],[255,204,170,255]
];
let viewport={width:1,height:1},sprites=new Map(),objects=new Map();
let image=ctx.createImageData(1,1),socket=new WebSocket(address);
let zoom=1,panX=0,panY=0,autoFit=true,dragging=false,dragX=0,dragY=0;
socket.binaryType="arraybuffer";
ctx.imageSmoothingEnabled=false;

function setStatus(text){
  status.textContent=text;
  status.classList.toggle("hidden",!text);
}

function applyView(){
  canvas.style.width=viewport.width+"px";
  canvas.style.height=viewport.height+"px";
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
}

function fit(){
  zoom=Math.max(.1,Math.min(innerWidth/viewport.width,innerHeight/viewport.height));
  panX=Math.floor((innerWidth-viewport.width*zoom)/2);
  panY=Math.floor((innerHeight-viewport.height*zoom)/2);
  applyView();
}

function maybeFit(){
  if(autoFit)fit();
  else applyView();
}

function clearBlack(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function readU16(bytes,offset){
  return bytes[offset]|(bytes[offset+1]<<8);
}

function readI16(bytes,offset){
  const value=readU16(bytes,offset);
  return value&0x8000?value-0x10000:value;
}

function setViewport(width,height){
  viewport={width,height};
  canvas.width=width;
  canvas.height=height;
  image=ctx.createImageData(width,height);
  maybeFit();
}

function putPixel(x,y,color){
  if(x<0||y<0||x>=viewport.width||y>=viewport.height||color===0)return;
  const rgba=palette[(color-1)&15],offset=(y*viewport.width+x)*4;
  image.data[offset]=rgba[0];
  image.data[offset+1]=rgba[1];
  image.data[offset+2]=rgba[2];
  image.data[offset+3]=255;
}

function draw(){
  if(socket.readyState===WebSocket.CLOSED)return;
  image.data.fill(0);
  const ordered=[...objects.values()].sort((a,b)=>
    a.z-b.z||a.y-b.y||a.id-b.id
  );
  for(const object of ordered){
    const sprite=sprites.get(object.spriteId);
    if(!sprite)continue;
    for(let y=0;y<sprite.height;y++){
      for(let x=0;x<sprite.width;x++){
        putPixel(
          object.x+x,
          object.y+y,
          sprite.pixels[y*sprite.width+x]
        );
      }
    }
  }
  ctx.putImageData(image,0,0);
  setStatus("");
}

function parse(bytes){
  let offset=0;
  while(offset<bytes.length){
    const type=bytes[offset++];
    if(type===0x01){
      const id=readU16(bytes,offset);
      const width=readU16(bytes,offset+2);
      const height=readU16(bytes,offset+4);
      offset+=6;
      const size=width*height;
      sprites.set(id,{
        width,
        height,
        pixels:bytes.slice(offset,offset+size)
      });
      offset+=size;
    }else if(type===0x02){
      const id=readU16(bytes,offset);
      const x=readI16(bytes,offset+2);
      const y=readI16(bytes,offset+4);
      const z=readI16(bytes,offset+6);
      const spriteId=readU16(bytes,offset+8);
      objects.set(id,{id,x,y,z,spriteId});
      offset+=10;
    }else if(type===0x03){
      objects.delete(readU16(bytes,offset));
      offset+=2;
    }else if(type===0x04){
      objects.clear();
    }else if(type===0x05){
      setViewport(readU16(bytes,offset),readU16(bytes,offset+2));
      offset+=4;
    }else{
      socket.close();
      break;
    }
  }
  draw();
}

socket.onmessage=event=>parse(new Uint8Array(event.data));
socket.onopen=()=>setStatus("");
socket.onclose=()=>{
  clearBlack();
  setStatus("disconnected...");
};
socket.onerror=()=>{
  clearBlack();
  setStatus("disconnected...");
};

addEventListener("resize",()=>maybeFit());
addEventListener("wheel",event=>{
  event.preventDefault();
  autoFit=false;
  const beforeX=(event.clientX-panX)/zoom;
  const beforeY=(event.clientY-panY)/zoom;
  const factor=event.deltaY<0?1.15:1/1.15;
  zoom=Math.min(64,Math.max(.1,zoom*factor));
  panX=event.clientX-beforeX*zoom;
  panY=event.clientY-beforeY*zoom;
  applyView();
},{passive:false});
addEventListener("pointerdown",event=>{
  autoFit=false;
  dragging=true;
  dragX=event.clientX-panX;
  dragY=event.clientY-panY;
  try{canvas.setPointerCapture(event.pointerId)}catch(e){}
});
addEventListener("pointermove",event=>{
  if(!dragging)return;
  panX=event.clientX-dragX;
  panY=event.clientY-dragY;
  applyView();
});
addEventListener("pointerup",event=>{
  dragging=false;
  try{canvas.releasePointerCapture(event.pointerId)}catch(e){}
});
addEventListener("dblclick",()=>{
  autoFit=true;
  fit();
});
fit();
</script>
</body>
</html>
